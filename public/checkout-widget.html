<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      padding: 20px;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 14px;
      color: #6b7280;
    }
    .badge {
      display: inline-block;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .badge.sasu { background: #f0e6ff; color: #7c3aed; }
    .recap {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .recap-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 14px;
    }
    .recap-row:last-child { border-bottom: none; }
    .recap-label { color: #6b7280; }
    .recap-value { font-weight: 600; color: #1a1a2e; text-align: right; max-width: 60%; word-break: break-word; }
    .packs {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .pack {
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      position: relative;
      transition: border-color 0.2s;
    }
    .pack.recommended {
      border-color: #2563eb;
    }
    .pack-badge {
      position: absolute;
      top: -10px;
      right: 16px;
      background: #2563eb;
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 8px;
    }
    .pack-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .pack-price {
      font-size: 20px;
      font-weight: 800;
      color: #2563eb;
      margin-bottom: 6px;
    }
    .pack-price.free { color: #059669; }
    .pack-features {
      list-style: none;
      font-size: 13px;
      color: #4b5563;
    }
    .pack-features li {
      padding: 2px 0;
    }
    .pack-features li::before {
      content: "â ";
      color: #059669;
      font-weight: 700;
    }
    .cta-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    .cta-btn:hover { background: #1d4ed8; }
    .cta-btn.sasu { background: #7c3aed; }
    .cta-btn.sasu:hover { background: #6d28d9; }
    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #9ca3af;
    }
    .footer img {
      height: 20px;
      vertical-align: middle;
      margin-left: 4px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Chargement...</p>
    </div>
  </div>

  <script>
    // Listen for tool results from the MCP host
    window.addEventListener("message", (event) => {
      if (event.source !== window.parent) return;
      const msg = event.data;
      if (!msg || msg.jsonrpc !== "2.0") return;
      if (msg.method !== "ui/notifications/tool-result") return;

      const data = msg.params?.structuredContent;
      if (data) render(data);
    }, { passive: true });

    function render(data) {
      const app = document.getElementById("app");
      const isSasu = data.type === "sasu";
      const badgeClass = isSasu ? "badge sasu" : "badge";
      const badgeText = isSasu ? "SASU" : "Micro-entreprise";
      const ctaClass = isSasu ? "cta-btn sasu" : "cta-btn";

      let recapRows = "";
      if (data.email) recapRows += row("Email", data.email);
      if (data.phone) recapRows += row("Telephone", data.phone);
      if (data.activity) recapRows += row("Activite", data.activity);
      if (data.company_name) recapRows += row("Societe", data.company_name);

      const packs = isSasu ? `
        <div class="packs">
          <div class="pack">
            <div class="pack-name">Pack Basique</div>
            <div class="pack-price free">0 &euro;</div>
            <ul class="pack-features">
              <li>Creation simple</li>
              <li>Demarches en ligne</li>
            </ul>
          </div>
          <div class="pack recommended">
            <div class="pack-badge">Recommande</div>
            <div class="pack-name">Pack Standard</div>
            <div class="pack-price">99 &euro;</div>
            <ul class="pack-features">
              <li>Accompagnement personnalise</li>
              <li>Redaction des statuts</li>
              <li>Publication JAL incluse</li>
            </ul>
          </div>
          <div class="pack">
            <div class="pack-name">Pack Express 24H</div>
            <div class="pack-price">199 &euro;</div>
            <ul class="pack-features">
              <li>Traitement prioritaire</li>
              <li>Tout le Pack Standard</li>
              <li>Immatriculation en 24h</li>
            </ul>
          </div>
        </div>
      ` : `
        <div class="packs">
          <div class="pack">
            <div class="pack-name">Pack Basique</div>
            <div class="pack-price free">0 &euro;</div>
            <ul class="pack-features">
              <li>Creation simple</li>
              <li>Declaration au Guichet Unique</li>
            </ul>
          </div>
          <div class="pack recommended">
            <div class="pack-badge">Recommande</div>
            <div class="pack-name">Pack Standard</div>
            <div class="pack-price">59 &euro;</div>
            <ul class="pack-features">
              <li>Accompagnement personnalise</li>
              <li>Verification du dossier</li>
              <li>Support prioritaire</li>
            </ul>
          </div>
          <div class="pack">
            <div class="pack-name">Pack Express</div>
            <div class="pack-price">99 &euro;</div>
            <ul class="pack-features">
              <li>Traitement prioritaire</li>
              <li>Tout le Pack Standard</li>
              <li>Immatriculation acceleree</li>
            </ul>
          </div>
        </div>
      `;

      app.innerHTML = `
        <div class="header">
          <span class="${badgeClass}">${badgeText}</span>
          <h1>Finalisez votre creation</h1>
          <p>Choisissez votre pack et procedez au paiement</p>
        </div>
        <div class="recap">
          ${recapRows}
        </div>
        ${packs}
        <a href="${data.checkout_url}" target="_blank" rel="noopener" class="${ctaClass}">
          Acceder au checkout LegalPlace &rarr;
        </a>
        <div class="footer">
          Powered by LegalPlace
        </div>
      `;
    }

    function row(label, value) {
      return `<div class="recap-row"><span class="recap-label">${label}</span><span class="recap-value">${value}</span></div>`;
    }
  </script>
</body>
</html>
